services:

  mysql:
    image: mysql
    container_name: mysql-container

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backend

    volumes:
      - mysql_data:/var/lib/mysql

  yourkart-backend:
    build: .
    container_name: backend-container

    ports:
      - "8000:8000"

    depends_on:
      - mysql


volumes:
  mysql_data: